<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:layout name="Default" />

<f:section name="Title">WIH Cement — Building the Future</f:section>

<f:section name="Main">

    <!-- Hero Banner -->
    <section class="hero-section" aria-label="Hero banner">
        <div class="hero-content">
            <h1 class="hero-title">Building the Future with Quality Cement</h1>
            <p class="hero-subtitle">Trusted by builders, engineers and governments across Africa</p>
            <div class="hero-cta">
                <f:link.page pageUid="{settings.productsPageUid}" class="btn btn-primary btn-lg">
                    Explore Products
                </f:link.page>
                <f:link.page pageUid="{settings.contactPageUid}" class="btn btn-outline btn-lg">
                    Get a Quote
                </f:link.page>
            </div>
        </div>
        <div class="hero-overlay" aria-hidden="true"></div>
    </section>

    <!-- Content from backend (colPos 0-9) -->
    <f:cObject typoscriptObjectPath="lib.dynamicContent" data="{colPos: 1}" />

    <!-- About Section -->
    <section class="about-section section-padding">
        <div class="container">
            <f:cObject typoscriptObjectPath="lib.dynamicContent" data="{colPos: 1}" />
        </div>
    </section>

    <!-- Product Highlights -->
    <section class="products-section section-padding bg-light">
        <div class="container">
            <h2 class="section-title">Our Products</h2>
            <f:cObject typoscriptObjectPath="lib.dynamicContent" data="{colPos: 2}" />
        </div>
    </section>

    <!-- Key Strengths -->
    <section class="strengths-section section-padding">
        <div class="container">
            <f:cObject typoscriptObjectPath="lib.dynamicContent" data="{colPos: 3}" />
        </div>
    </section>

    <!-- Certifications -->
    <section class="certifications-section section-padding bg-light">
        <div class="container">
            <f:cObject typoscriptObjectPath="lib.dynamicContent" data="{colPos: 4}" />
        </div>
    </section>

    <!-- Ongoing Projects -->
    <section class="projects-section section-padding">
        <div class="container">
            <h2 class="section-title">Featured Projects</h2>
            <f:cObject typoscriptObjectPath="lib.dynamicContent" data="{colPos: 5}" />
        </div>
    </section>

    <!-- Testimonials -->
    <section class="testimonials-section section-padding bg-dark">
        <div class="container">
            <h2 class="section-title text-white">What Our Clients Say</h2>
            <f:cObject typoscriptObjectPath="lib.dynamicContent" data="{colPos: 6}" />
        </div>
    </section>

    <!-- Latest News -->
    <section class="news-section section-padding">
        <div class="container">
            <h2 class="section-title">Latest News</h2>
            <f:cObject typoscriptObjectPath="lib.dynamicContent" data="{colPos: 7}" />
            <div class="text-center mt-4">
                <f:link.page pageUid="{settings.newsPageUid}" class="btn btn-secondary">
                    View All News
                </f:link.page>
            </div>
        </div>
    </section>

    <!-- Contact CTA -->
    <section class="contact-cta section-padding bg-primary">
        <div class="container text-center">
            <f:cObject typoscriptObjectPath="lib.dynamicContent" data="{colPos: 8}" />
        </div>
    </section>

    <!-- FAQ -->
    <section class="faq-section section-padding">
        <div class="container">
            <h2 class="section-title">Frequently Asked Questions</h2>
            <f:cObject typoscriptObjectPath="lib.dynamicContent" data="{colPos: 9}" />
        </div>
    </section>

</f:section>
